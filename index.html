<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nafas</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="mobile-container">

        <!-- ========================= -->
        <!-- Header -->
        <!-- ========================= -->

        <header>

            <button class="menu-btn">
                <i class="bi bi-list"></i>
            </button>

       <div class="logo-area">

    <img src="assets/icon-blue.png"
         class="top-logo"
         alt="Nafas">


</div>

        </header>





        <!-- ========================= -->
        <!-- Safe Card -->
        <!-- ========================= -->

        <section class="status-card">

            <div class="status-icon">

                <i class="bi bi-check-lg"></i>

            </div>

            <div class="status-text">

                <h1>النظام آمن</h1>

                <p>تم تحليل الأبخرة بنجاح</p>

            </div>

        </section>





        <!-- ========================= -->
        <!-- Air Quality -->
        <!-- ========================= -->

        <section class="air-quality">

            <div class="section-header">

                <h3>جودة الهواء</h3>

                <span class="good-status">

                    <span class="green-dot"></span>

                    جيدة

                </span>

            </div>





            <!-- Animated Graph -->

            <div class="graph">

                <svg viewBox="0 0 500 120">

                  <path id="wavePath"

d="M0,90
C40,70 70,35 110,60
C150,90 180,120 220,70
C250,35 300,45 330,80
C360,115 400,100 430,60
C455,35 480,40 500,70">

</path>

                </svg>

            </div>

        </section>






        <!-- ========================= -->
        <!-- Stats -->
        <!-- ========================= -->

        <section class="stats-card">

            <div class="stat-box">

                <span class="label">PM2.5</span>

                <h2 class="counter" data-target="12">0</h2>

                <small>µg/m³</small>

            </div>

            <div class="stat-box">

                <span class="label">VOC</span>

                <h2 class="counter" data-target="120">0</h2>

                <small>ppb</small>

            </div>

            <div class="stat-box">

                <span class="label">CO₂</span>

                <h2 class="counter" data-target="420">0</h2>

                <small>ppm</small>

            </div>

            <div class="stat-box">

                <span class="label">TEMP</span>

                <h2 class="counter" data-target="22">0</h2>

                <small>°C</small>

            </div>

        </section>






        <!-- ========================= -->
        <!-- Bottom Navigation -->
        <!-- ========================= -->
<!-- Floating Button -->

<div class="floating-btn">

    <img src="assets/icon-white.png" alt="Nafas">

</div>


<nav class="bottom-nav">

    <a href="#" class="nav-item active">

        <i class="bi bi-house"></i>

        <span>الرئيسية</span>

    </a>

    <a href="#" class="nav-item">

        <i class="bi bi-phone"></i>

        <span>الأجهزة</span>

    </a>

    <a href="#" class="nav-item">

        <i class="bi bi-bell"></i>

        <span>التنبيهات</span>

    </a>

    <a href="#" class="nav-item">

        <i class="bi bi-bar-chart"></i>

        <span>التقارير</span>

    </a>

</nav>

    </div>

    <script src="script.js"></script>

</body>

</html>
